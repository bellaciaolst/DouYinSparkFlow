# 此工作流用于运行dev（测试）分支的定时任务，如果不清楚请使用 DouYin Spark Flow Schedule Run

name: 【dev（测试）分支】DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
  schedule: # 定时任务
    - cron: "25 */1 * * *"

jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data
    steps:
    - uses: actions/checkout@v4
      with:
        # 🎯 核心修复：加上 refs/heads/ 前缀，强制声明这是一个具体的完整分支名
        # 这样能彻底防止 actions/checkout 插件把它误当成模糊匹配（dev*），100% 解决 Git fetch 失败的问题
        ref: refs/heads/dev

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Test Douyin Accessibility
      run: |
        curl -I https://www.douyin.com/chat

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell

    - name: Export Github Environment Variables and Secrets to JSON
      env:
        VARS_JSON: ${{ toJson(vars) }}
        SECRETS_JSON: ${{ toJson(secrets) }}
      run: python utils/export_github_env.py

    - name: Run DouYin Spark Flow
      run: python main.py

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
